<!DOCTYPE html>
<html>
<head>
    <title>HikariSnowbell Direct Speak</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #fff0f5; }
        input { padding: 10px; width: 300px; border-radius: 5px; border: 1px solid #ffb6c1; }
        button { padding: 10px 20px; background: #ff69b4; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #ff1493; }
    </style>
</head>
<body>
    <h1>雪鈴緋光 手動說話控制台 🐾</h1>
    <input type="text" id="words" placeholder="你想緋光講咩喵？">
    <button onclick="speak()">叫佢講嘢！</button>

    <script>
        function speak() {
            const text = document.getElementById('words').value;
            const url = `http://127.0.0.1:12393/tts?text=${encodeURIComponent(text)}`;
            fetch(url).then(() => console.log('Sent!'));
        }
    </script>
</body>
</html>
